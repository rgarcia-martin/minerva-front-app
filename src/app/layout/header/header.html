<header class="header">
  <div class="header__title">
    <button type="button" class="header__hamburger" aria-label="Menú" (click)="menuToggle.emit()">
      <span></span><span></span><span></span>
    </button>
    <span class="header__brand">Minerva</span>
    <span class="header__subtitle">Panel de gestión</span>
  </div>
  <div class="header__actions">
    <button type="button" class="header__action" aria-label="Buscar">
      <span aria-hidden="true">⌕</span>
    </button>
    <button type="button" class="header__user">
      <span class="header__avatar">M</span>
      <span class="header__user-name">Operador</span>
    </button>
  </div>
</header>
